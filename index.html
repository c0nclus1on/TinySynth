<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>TinySynth</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>🎹 TinySynth</h1>
        <div class="octave-ctl">
          <button id="octDown" title="Octave down (Down arrow)">−</button>
          <span id="octave">Octave: C4</span>
          <button id="octUp" title="Octave up (Up arrow)">+</button>
        </div>
      </header>

      <div id="controls"></div>

      <div class="keyboard-area">
        <div id="piano"></div>
        <p class="hint">
          Two octaves — lower on <kbd>Z</kbd><kbd>X</kbd><kbd>C</kbd>…
          (sharps <kbd>S</kbd><kbd>D</kbd><kbd>G</kbd><kbd>H</kbd><kbd>J</kbd>),
          upper on <kbd>Q</kbd><kbd>W</kbd><kbd>E</kbd>…
          (sharps <kbd>2</kbd><kbd>3</kbd><kbd>5</kbd><kbd>6</kbd><kbd>7</kbd>)
          · octave <kbd>↑</kbd> / <kbd>↓</kbd> · or click the keys
        </p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
